<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        /* ==========================================
           1. カスタムCSS (Tailwindの代替)
           ========================================== */
        :root {
            --bg-body: #fafafa;
            --bg-white: #ffffff;
            --zinc-50: #fafafa;
            --zinc-100: #f4f4f5;
            --zinc-200: #e4e4e7;
            --zinc-300: #d4d4d8;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --zinc-600: #52525b;
            --zinc-800: #27272a;
            --zinc-900: #18181b;
            --red-50: #fef2f2;
            --red-200: #fecaca;
            --red-600: #dc2626;
            --amber-50: #fffbeb;
            --amber-200: #fde68a;
            --amber-700: #b45309;
            --emerald-50: #ecfdf5;
            --emerald-200: #a7f3d0;
            --emerald-600: #059669;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-body); color: var(--zinc-900); line-height: 1.5; -webkit-font-smoothing: antialiased; }
        
        button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; transition: all 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:active:not(:disabled) { transform: scale(0.98); }
        
        input, select, textarea { width: 100%; padding: 1rem; border: 1px solid var(--zinc-200); border-radius: var(--radius-xl); background: var(--bg-white); font: inherit; outline: none; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--zinc-900); box-shadow: 0 0 0 2px rgba(24,24,27,0.1); }
        
        a { text-decoration: none; color: inherit; }
        .hidden { display: none !important; }

        /* Typography */
        .text-xs { font-size: 0.75rem; } .text-sm { font-size: 0.875rem; } .text-base { font-size: 1rem; }
        .text-lg { font-size: 1.125rem; } .text-xl { font-size: 1.25rem; } .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 1.875rem; } .text-4xl { font-size: 2.25rem; } .text-5xl { font-size: 3rem; }
        .font-medium { font-weight: 500; } .font-bold { font-weight: 700; } .font-black { font-weight: 900; }
        .text-center { text-align: center; } .text-right { text-align: right; }
        .text-zinc-400 { color: var(--zinc-400); } .text-zinc-500 { color: var(--zinc-500); }
        .text-zinc-600 { color: var(--zinc-600); } .text-zinc-900 { color: var(--zinc-900); }
        .text-white { color: var(--bg-white); } .text-red-600 { color: var(--red-600); }
        .uppercase { text-transform: uppercase; } .tracking-wider { letter-spacing: 0.05em; } .tracking-widest { letter-spacing: 0.1em; }
        .line-through { text-decoration: line-through; } .whitespace-pre-wrap { white-space: pre-wrap; }

        /* Layout */
        .flex { display: flex; } .flex-col { flex-direction: column; } .flex-1 { flex: 1; }
        .items-center { align-items: center; } .items-end { align-items: flex-end; }
        .justify-center { justify-content: center; } .justify-between { justify-content: space-between; }
        .flex-wrap { flex-wrap: wrap; } .shrink-0 { flex-shrink: 0; }
        .gap-2 { gap: 0.5rem; } .gap-3 { gap: 0.75rem; } .gap-4 { gap: 1rem; } .gap-6 { gap: 1.5rem; } .gap-8 { gap: 2rem; }

        .w-full { width: 100%; } .h-full { height: 100%; }

        .mx-auto { margin-left: auto; margin-right: auto; }

        .mb-2 { margin-bottom: 0.5rem; } .mb-4 { margin-bottom: 1rem; } .mb-6 { margin-bottom: 1.5rem; } .mb-8 { margin-bottom: 2rem; }
        .p-4 { padding: 1rem; } .p-6 { padding: 1.5rem; } .p-8 { padding: 2rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; } .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; } .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .pt-6 { padding-top: 1.5rem; } .pb-12 { padding-bottom: 3rem; }
        
        .relative { position: relative; } .absolute { position: absolute; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; } .inset-y-0 { top: 0; bottom: 0; } .right-0 { right: 0; }

        /* Backgrounds & Borders */
        .bg-white { background-color: var(--bg-white); } .bg-zinc-50 { background-color: var(--zinc-50); }
        .bg-zinc-100 { background-color: var(--zinc-100); } .bg-zinc-900 { background-color: var(--zinc-900); }
        .border { border: 1px solid var(--zinc-200); } .border-2 { border: 2px solid var(--zinc-200); }
        .border-t { border-top: 1px solid var(--zinc-200); } .border-b { border-bottom: 1px solid var(--zinc-200); }
        .rounded-lg { border-radius: var(--radius-lg); } .rounded-xl { border-radius: var(--radius-xl); }
        .rounded-2xl { border-radius: var(--radius-2xl); } .rounded-3xl { border-radius: 2rem; }
        .rounded-full { border-radius: var(--radius-full); }
        .shadow-sm { box-shadow: var(--shadow-sm); } .shadow-md { box-shadow: var(--shadow-md); }
        .shadow-lg { box-shadow: var(--shadow-lg); } .shadow-xl { box-shadow: var(--shadow-xl); }
        .overflow-hidden { overflow: hidden; } .object-cover { object-fit: cover; }

        /* UI Components */
        .btn-primary { background-color: var(--zinc-900); color: var(--bg-white); font-weight: bold; padding: 1rem 1.5rem; border-radius: var(--radius-xl); display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; box-shadow: var(--shadow-md); }
        .btn-primary:hover { background-color: var(--zinc-800); }
        
        .badge { padding: 0.25rem 0.5rem; border-radius: var(--radius-full); font-size: 0.7rem; font-weight: 900; border: 1px solid; display: inline-flex; align-items: center; gap: 0.25rem; white-space: nowrap; text-transform: uppercase;}
        .badge-red { background: var(--red-50); color: var(--red-600); border-color: var(--red-200); }
        .badge-amber { background: var(--amber-50); color: var(--amber-700); border-color: var(--amber-200); }
        .badge-emerald { background: var(--emerald-50); color: var(--emerald-600); border-color: var(--emerald-200); }
        .badge-gray { background: var(--zinc-100); color: var(--zinc-600); border-color: var(--zinc-200); }

        /* Grid & Responsive */
        .grid { display: grid; }
        .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        
        .app-layout { display: flex; flex-direction: column; min-height: 100vh; }
        .sidebar { display: none; }
        .mobile-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: var(--bg-white); border-bottom: 1px solid var(--zinc-200); position: sticky; top: 0; z-index: 30; }
        .main-content { flex: 1; padding: 1rem; overflow-y: auto; width: 100%; max-width: 72rem; margin: 0 auto; }
        .mobile-menu { position: fixed; inset: 0; background: var(--bg-white); z-index: 40; padding: 1.5rem; display: flex; flex-direction: column; }
        
        @media (min-width: 768px) {
            .app-layout { flex-direction: row; }
            .sidebar { display: flex; width: 16rem; flex-direction: column; background: var(--bg-white); border-right: 1px solid var(--zinc-200); position: sticky; top: 0; height: 100vh; padding: 1.5rem; }
            .mobile-header { display: none; }
            .main-content { padding: 2.5rem; }
            .md-grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .md-grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .md-flex-row { flex-direction: row; }
            .md-items-center { align-items: center; }
            .md-items-end { align-items: flex-end; }
            .md-w-auto { width: auto; }
        }

        /* Nav Items */
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.5rem; color: var(--zinc-500); font-weight: bold; font-size: 0.875rem; transition: background 0.2s; border-radius: var(--radius-xl); margin: 0.25rem 0; width: 100%; justify-content: flex-start; }
        .nav-item:hover { background: var(--zinc-50); color: var(--zinc-900); }
        .nav-item.active { background: var(--zinc-900); color: var(--bg-white); box-shadow: var(--shadow-md); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-content { background: var(--bg-white); width: 100%; max-width: 24rem; border-radius: 2rem; padding: 2rem; box-shadow: var(--shadow-xl); text-align: center; animation: fadeIn 0.2s ease-out; }
    </style>
</head>
<body>
    <!-- アプリの描画領域 -->
    <div id="app" class="app-layout"></div>

    <!-- モーダル描画領域 -->
    <div id="modal-root"></div>

    <script>
        // ==========================================
        // 1. PWA（スマホアプリ化）設定
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            const manifestData = {
                "name": "ORIGIN Compass",
                "short_name": "ORIGIN",
                "start_url": "./",
                "display": "standalone",
                "background_color": "#ffffff",
                "theme_color": "#18181b",
                "icons": [
                    { "src": "https://api.dicebear.com/7.x/shapes/svg?seed=origin", "sizes": "192x192", "type": "image/svg+xml" },
                    { "src": "https://api.dicebear.com/7.x/shapes/svg?seed=origin", "sizes": "512x512", "type": "image/svg+xml" }
                ]
            };
            const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            
            const link = document.createElement('link');
            link.id = 'manifest-link';
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);
        });

        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => {
                    e.waitUntil(caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))));
                    self.clients.claim();
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW failed', err));
            });
        }

        // ==========================================
        // 2. アイコンデータ (SVGを直接埋め込み)
        // ==========================================
        const icons = {

            logOut: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>',
            checkSquare: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
            video: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>',
            edit: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
            checkCircle: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            alertCircle: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>',
            chevronRight: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
            playCircle: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>',
            messageSquare: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
            play: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
            x: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>',
            externalLink: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>',
            shieldCheck: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>',
            award: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>',
            camera: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>',
            menu: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>',
            refreshCw: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>',

        };

        function icon(name, size=24, extraClass="") {
            if(!icons[name]) return '';
            return icons[name].replace('width="24"', `width="${size}"`).replace('height="24"', `height="${size}"`).replace('<svg ', `<svg class="${extraClass}" `);
        }

        // ==========================================
        // 3. データストア・状態管理
        // ==========================================
        const genId = () => 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        const getTodayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
        
        const load = (key, def) => { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; };
        const save = (key, data) => localStorage.setItem(key, JSON.stringify(data));

        const MILESTONE_TASKS = ['初めてのアポを取る', '初めての受注をする', '2件目のアポを取る', '2件目の受注をする', '3件目 受注する', '4件目 受注する（料金説明までやる）', 'アポインター 卒業する'];

        let state = {
            profiles: load('origin_profiles', []),
            phases: load('origin_phases', []),
            tasks: load('origin_tasks', []),
            userTasks: load('origin_userTasks', []),
            settings: load('origin_settings', { adminSecretKey: 'origin2026' }),
            currentUser: null,
            view: 'dashboard',
            activeTask: null,
            activeTargetUser: null, 
            
            // UI State
            authMode: 'login',
            authRole: 'user',
            authName: '',
            authPass: '',
            authSecret: '',
            authAvatarUrl: '',
            authShowPass: false,
            authError: '',
            mobileMenuOpen: false,
            
            editingTask: null, 
            editTaskData: {},
            newPhaseName: '',
            newSecretKey: '',
            testAnswers: {},
            testResult: null,
            
            // Modals
            confirm: null, // { msg, onConfirm }
            alert: null,   // string
        };

        // 初期ロード
        const sid = localStorage.getItem('origin_current_id');
        if (sid) {
            state.currentUser = state.profiles.find(p => p.id === sid);
            if(state.currentUser) {
                state.currentUser.lastActiveAt = Date.now();
                save('origin_profiles', state.profiles);
            }
        }

        // ==========================================
        // 4. アプリケーションロジック
        // ==========================================
        function showAlert(msg) { state.alert = msg; render(); }
        function showConfirm(msg, onConfirm) { state.confirm = { msg, onConfirm }; render(); }
        function closeModals() { state.alert = null; state.confirm = null; render(); }

        function seedData() {
            const pData = [
              { name: 'フェーズ1: 入社準備', tasks: [{type:'link', title:'名簿作成', content:'https://google.com'}, {type:'test', title:'理解度テスト', content:'{"passScore":100,"questions":[{"q":"準備はOK？","options":["はい","いいえ"],"answer":0}]}'}] },
              { name: 'フェーズ2: 初稼働', tasks: [{type:'normal', title:'初めてのアポを取る'}, {type:'text', title:'稼働の振り返り'}, {type:'video', title:'ロープレ動画', content:'https://www.w3schools.com/html/mov_bbb.mp4'}] },
              { name: 'フェーズ3: アポインター卒業', tasks: [{type:'normal', title:'2件目のアポを取る'}, {type:'normal', title:'初めての受注をする'}, {type:'normal', title:'アポインター 卒業する'}] },
              { name: 'フェーズ4: クローザーへの道', tasks: [{type:'video', title:'クローザー動画', content:'https://www.w3schools.com/html/mov_bbb.mp4'}, {type:'normal', title:'クローザー として稼働する'}] }
            ];
            
            let newPh = [], newTk = [];
            pData.forEach((p, i) => {
                const pid = genId();
                newPh.push({ id: pid, name: p.name, order: i+1 });
                p.tasks.forEach((t, j) => { newTk.push({ id: genId(), phaseId: pid, order: j+1, ...t }); });
            });
            state.phases = newPh; save('origin_phases', state.phases);
            state.tasks = newTk; save('origin_tasks', state.tasks);
            render();
        }

        function handleStartWork() {
            if(state.currentUser.lastWorkDate === getTodayStr()) return;
            state.currentUser.lastWorkDate = getTodayStr();
            state.currentUser.workDays = (state.currentUser.workDays || 0) + 1;
            save('origin_profiles', state.profiles);
            render();
        }

        function completeTask(taskId, extra = {}) {
            const existing = state.userTasks.find(u => u.taskId === taskId && u.userId === state.currentUser.id);
            const tk = state.tasks.find(t=>t.id===taskId);
            
            const data = { 
                userId: state.currentUser.id, taskId, 
                isCompleted: tk.type !== 'text', 
                completedAt: Date.now(), 
                workDaysAtCompletion: state.currentUser.workDays || 0,
                ...extra 
            };
            
            if(existing) { Object.assign(existing, data); } 
            else { state.userTasks.push({ id: genId(), ...data }); }
            
            save('origin_userTasks', state.userTasks);
            state.view = 'dashboard';
            state.activeTask = null;
            render();
        }

        // ==========================================
        // 5. 描画 (レンダリング)
        // ==========================================
        function escapeHTML(str) {
            if(str == null) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag] || tag));
        }

        function renderBadge(text, color) {
            const cls = color === 'red' ? 'badge-red' : color === 'amber' ? 'badge-amber' : color === 'emerald' ? 'badge-emerald' : 'badge-gray';
            return `<span class="badge ${cls}">${text}</span>`;
        }

            const u = state.currentUser;
            const cCount = state.userTasks.filter(ut => ut.userId === u.id && ut.isCompleted).length;
            const prog = state.tasks.length ? Math.round((cCount / state.tasks.length) * 100) : 0;

                 <div class="bg-zinc-50 px-8 py-5 rounded-3xl border border-zinc-200 text-right min-w-[180px]">
                    <p class="text-xs font-bold text-zinc-500 uppercase tracking-widest mb-1">Progress</p>
                    <p class="text-5xl font-black text-zinc-900 tracking-tighter">${prog}%</p>
                    <div class="border-t border-zinc-200 pt-3 mt-3 flex justify-between items-center"><span class="text-xs font-bold text-zinc-500">稼働日数</span><span class="font-black text-lg">${u.workDays||0}日</span></div>
                 </div>
              </div>

              <div class="space-y-6 pt-4">
                ${state.phases.map(p => {
                  const tks = state.tasks.filter(t=>t.phaseId===p.id);
                  if(!tks.length) return '';
                  return `
                  <div class="bg-white border border-zinc-200 rounded-3xl overflow-hidden shadow-sm">
                    <div class="bg-zinc-50 px-8 py-5 border-b border-zinc-100 font-black text-sm uppercase tracking-widest text-zinc-500">${escapeHTML(p.name)}</div>
                    <div class="divide-y divide-zinc-100">
                      ${tks.map(t => {
                        const ut = state.userTasks.find(x => x.taskId===t.id && x.userId===u.id);
                        const isC = ut?.isCompleted;
                        return `
                        <div class="p-6 md:p-8 transition-colors ${!isC && ut?.textAnswer ? 'bg-amber-50/50' : ''}">
                           <div class="flex items-center gap-4 mb-2">
                             ${isC ? icon('checkCircle',24,'text-zinc-900 shrink-0') : '<div class="w-6 h-6 rounded-full border-2 border-zinc-300 shrink-0"></div>'}
                             <p class="font-bold text-xl ${isC?'text-zinc-900':'text-zinc-600'}">${escapeHTML(t.title)}</p>
                           </div>
                           ${ut ? `
                             <div class="ml-10 mt-4 space-y-4">
                               ${t.type==='video' && ut.completionRate!==undefined ? `<p class="font-bold text-sm text-zinc-600 bg-zinc-50 inline-block px-3 py-1.5 rounded-lg border border-zinc-200">視聴率: <span class="font-black text-zinc-900">${Math.round(ut.completionRate)}%</span></p>`:''}
                               ${t.type==='test' && ut.score!==undefined ? `<p class="font-bold text-sm text-zinc-600 bg-zinc-50 inline-block px-3 py-1.5 rounded-lg border border-zinc-200">スコア: <span class="font-black ${ut.score>=100?'text-emerald-600':'text-red-600'}">${ut.score}点</span></p>`:''}
                               ${t.type==='text' && ut.textAnswer ? `
                                 <div class="bg-white p-6 rounded-2xl border ${isC?'border-zinc-200':'border-amber-200'} shadow-sm">
                                    <p class="text-xs font-black text-zinc-400 uppercase tracking-widest mb-3">提出内容</p>
                                    <p class="font-bold text-lg leading-relaxed whitespace-pre-wrap text-zinc-900">${escapeHTML(ut.textAnswer)}</p>
                                    <div class="mt-5 pt-5 border-t border-zinc-100">
                                      ${ut.adminComment ? `
                                        <p class="text-xs font-black text-zinc-400 uppercase tracking-widest mb-2 flex items-center gap-1">${icon('messageSquare',14)} フィードバック済</p>
                                        <p class="font-bold whitespace-pre-wrap text-zinc-700 bg-zinc-50 p-4 rounded-xl">${escapeHTML(ut.adminComment)}</p>
                                      ` : `
                                        <div class="flex flex-col gap-3">
                                          <p class="text-xs font-black text-amber-600 flex items-center gap-1 uppercase tracking-widest">${icon('alertCircle',14)} 確認して完了にする</p>
                                          <div class="flex flex-col md-flex-row gap-3">
                                            <input type="text" id="feedback_${ut.id}" placeholder="フィードバックを入力(空欄可)..." class="flex-1 font-bold bg-zinc-50" />
                                            <button data-action="approve-task" data-utid="${ut.id}" data-tid="${t.id}" class="bg-zinc-900 text-white px-6 py-3 rounded-xl font-black text-sm shrink-0 shadow-md hover:bg-zinc-800 active:scale-95 transition-all">承認する</button>
                                          </div>
                                        </div>
                                      `}
                                    </div>
                                 </div>
                               `:''}
                             </div>
                           ` : ''}
                        </div>`;
                      }).join('')}
                    </div>
                  </div>`;
                }).join('')}
              </div>
            </div>`;
        }

        function renderPhaseManagement() {
            return `
            <div class="space-y-10 animate-in pb-12 max-w-4xl mx-auto">
              <div class="flex flex-col md-flex-row md-items-end justify-between gap-6 border-b border-zinc-200 pb-6">
                 <div><h2 class="text-4xl font-black tracking-tight">管理設定</h2></div>
                 ${state.phases.length === 0 ? 
                   `<button data-action="seed-data" class="bg-zinc-900 text-white px-6 py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-transform text-sm">初期データ(39タスク)を生成</button>` : 
                   `<button data-action="reset-seed-data" class="bg-red-50 text-red-600 border border-red-200 px-6 py-3.5 rounded-2xl text-sm font-black shadow-sm active:scale-95 transition-transform">全タスクを初期化して再生成</button>`
                 }
              </div>

              <div class="bg-white border border-zinc-200 rounded-[2.5rem] p-8 shadow-sm">
                <h3 class="text-2xl font-black mb-3 flex items-center gap-2">${icon('shieldCheck',28)} セキュリティ設定</h3>
                <p class="text-zinc-500 font-bold mb-6">新しい管理者を登録する際に必要な「シークレットキー」を変更できます。</p>
                <div class="flex flex-col md-flex-row gap-4 items-center">
                  <input type="text" id="newSecretKeyInput" placeholder="新しいシークレットキー" value="${escapeHTML(state.newSecretKey)}" class="flex-1 font-bold text-lg bg-zinc-50 p-4 rounded-2xl border border-zinc-200"/>
                  <button data-action="update-secret" class="w-full md-w-auto bg-zinc-900 text-white px-10 py-4 rounded-2xl font-black shadow-md active:scale-95 transition-all">更新する</button>
                </div>
              </div>

              <div class="space-y-8 pt-6">
                 <h3 class="text-2xl font-black flex items-center gap-3"><div class="w-2 h-8 bg-zinc-900 rounded-full"></div>ロードマップ編集</h3>
                 ${state.phases.map(p => `
                   <div class="bg-white rounded-[2rem] border border-zinc-200 overflow-hidden shadow-sm">
                      <div class="bg-zinc-50 px-8 py-5 border-b border-zinc-100 flex justify-between items-center">
                        <span class="font-black text-xl text-zinc-900">${escapeHTML(p.name)}</span>
                        <button data-action="delete-phase" data-pid="${p.id}" class="text-zinc-400 hover:text-red-600 transition-colors">${icon('x',24)}</button>
                      </div>
                      <div class="p-6 space-y-4">
                        ${state.tasks.filter(t=>t.phaseId===p.id).map((t, idx) => `
                          ${state.editingTask?.id === t.id ? `
                             <div class="border-2 border-zinc-900 bg-zinc-50 p-6 rounded-2xl space-y-5 shadow-md my-4 animate-in">
                                <p class="text-xs font-black text-zinc-500 uppercase tracking-widest">タスクの編集</p>
                                <input type="text" data-model="editTitle" value="${escapeHTML(state.editTaskData.title)}" class="font-bold text-lg bg-white border border-zinc-200 p-4 rounded-xl" />
                                <select data-model="editType" class="font-bold text-base bg-white border border-zinc-200 p-4 rounded-xl">
                                  <option value="normal" ${state.editTaskData.type==='normal'?'selected':''}>通常タスク</option>
                                  <option value="video" ${state.editTaskData.type==='video'?'selected':''}>動画視聴 (100%再生必須)</option>
                                  <option value="test" ${state.editTaskData.type==='test'?'selected':''}>理解度テスト (自動採点)</option>
                                  <option value="text" ${state.editTaskData.type==='text'?'selected':''}>言語化提出 (管理者承認)</option>
                                  <option value="link" ${state.editTaskData.type==='link'?'selected':''}>リンクタスク</option>
                                </select>
                                ${['video','test','link'].includes(state.editTaskData.type) ? `
                                  <textarea data-model="editContent" placeholder="URLやJSONデータを入力..." class="font-mono text-sm h-32 bg-white border border-zinc-200 p-4 rounded-xl leading-relaxed">${escapeHTML(state.editTaskData.content)}</textarea>
                                ` : ''}
                                <div class="flex gap-3 pt-2">
                                  <button data-action="save-edit" class="flex-1 bg-zinc-900 text-white py-4 rounded-xl font-black text-sm shadow-md active:scale-95 transition-all">保存する</button>
                                  <button data-action="cancel-edit" class="flex-1 bg-white border border-zinc-200 font-black text-sm text-zinc-700 rounded-xl hover:bg-zinc-100 transition-colors">キャンセル</button>
                                </div>
                             </div>
                          ` : `
                            <div class="flex items-center justify-between p-5 bg-white border border-zinc-100 rounded-2xl hover:border-zinc-300 transition-colors group shadow-sm">
                              <div class="flex items-center gap-4">
                                <span class="text-zinc-300 font-black text-lg">${idx+1}.</span>
                                <div><p class="font-bold text-lg text-zinc-900">${escapeHTML(t.title)}</p><p class="text-xs font-bold text-zinc-400 font-mono mt-1 uppercase tracking-wider">${t.type}</p></div>
                              </div>
                              <div class="flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                                <button data-action="edit-task" data-tid="${t.id}" class="p-2.5 text-zinc-500 bg-zinc-50 border border-zinc-200 rounded-xl hover:text-zinc-900 hover:bg-white shadow-sm transition-all">${icon('edit',18)}</button>
                                <button data-action="delete-task" data-tid="${t.id}" data-title="${escapeHTML(t.title)}" class="p-2.5 text-zinc-500 bg-zinc-50 border border-zinc-200 rounded-xl hover:text-red-600 hover:bg-white shadow-sm transition-all">${icon('x',18)}</button>
                              </div>
                            </div>
                          `}
                        `).join('')}
                        ${!state.editingTask ? `<button data-action="add-task" data-pid="${p.id}" class="w-full py-5 text-sm font-black text-zinc-400 border-2 border-dashed border-zinc-200 rounded-2xl hover:bg-zinc-50 hover:text-zinc-600 transition-colors flex justify-center items-center gap-2">${icon('edit',18)} 新しいタスクを追加</button>` : ''}
                      </div>
                   </div>
                 `).join('')}
                 <div class="bg-white border-2 border-dashed border-zinc-200 rounded-[2rem] p-8 flex flex-col md-flex-row gap-4 items-center">
                    <input type="text" id="newPhaseName" placeholder="新しいフェーズの名前" value="${escapeHTML(state.newPhaseName)}" class="flex-1 bg-zinc-50 font-bold text-lg p-5 rounded-2xl border border-zinc-200"/>
                    <button data-action="add-phase" class="w-full md-w-auto bg-zinc-900 text-white px-10 py-5 rounded-2xl font-black shadow-md active:scale-95 transition-transform">追加</button>
                 </div>
              </div>
            </div>`;
        }

        function renderTaskExec() {
            const t = state.activeTask;
            const u = state.currentUser;
            const ut = state.userTasks.find(x=>x.taskId===t.id && x.userId===u.id);
            const isC = ut?.isCompleted;

            let contentHtml = '';
            if(t.type === 'normal') {
                contentHtml = `
                <div class="py-12 text-center">
                  ${isC ? `
                    <div class="w-24 h-24 bg-zinc-50 border border-zinc-200 text-zinc-900 rounded-full flex justify-center items-center mx-auto mb-6 shadow-sm">${icon('checkCircle',48)}</div>
                    <h3 class="text-3xl font-black">完了済み</h3><p class="text-zinc-500 font-bold mt-3 text-lg">このアクションは既に完了しています。</p>
                  ` : `
                    <div class="text-zinc-600 bg-zinc-50 border border-zinc-100 p-8 rounded-3xl font-bold mb-10 text-lg shadow-inner">内容を確認・実行し、完了したらボタンを押してください。</div>
                    <button data-action="complete-task" class="w-full py-6 bg-zinc-900 hover:bg-zinc-800 text-white font-black rounded-[2rem] shadow-xl active:scale-95 transition-all text-xl flex items-center justify-center gap-3">${icon('checkSquare',28)} アクションを完了にする</button>
                  `}
                </div>`;
            } else if(t.type === 'link') {
                contentHtml = `
                <div class="py-10 text-center space-y-10">
                  <div class="text-zinc-700 bg-zinc-50 p-8 rounded-3xl border border-zinc-100 font-bold text-left max-w-md mx-auto shadow-inner text-lg leading-loose">
                    <p class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-zinc-900 text-white flex items-center justify-center text-sm shrink-0">1</span> 下のボタンからリンク先を開く</p>
                    <p class="flex items-center gap-3 my-4"><span class="w-8 h-8 rounded-full bg-zinc-900 text-white flex items-center justify-center text-sm shrink-0">2</span> 必要な入力や設定を行う</p>
                    <p class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-zinc-900 text-white flex items-center justify-center text-sm shrink-0">3</span> このアプリに戻り完了にする</p>
                  </div>
                  <a href="${t.content}" target="_blank" class="inline-flex w-full max-w-md items-center justify-center gap-3 bg-white border-2 border-zinc-900 text-zinc-900 font-black py-6 rounded-[2rem] hover:bg-zinc-50 transition-colors shadow-sm text-xl">${icon('externalLink',28)} リンクを開く</a>
                  ${isC ? `<div class="text-zinc-600 font-black flex justify-center items-center gap-2 py-5 bg-zinc-100 rounded-[2rem] border border-zinc-200 max-w-md mx-auto text-lg shadow-inner">${icon('checkCircle',24)} 完了済み</div>` 
                        : `<div><button data-action="complete-task" class="w-full max-w-md py-6 bg-zinc-900 text-white font-black rounded-[2rem] shadow-xl text-xl active:scale-95 transition-transform">完了にする</button></div>`}
                </div>`;
            } else if(t.type === 'video') {
                contentHtml = `
                <div class="space-y-8 pt-6">
                  <div class="bg-black rounded-[2rem] overflow-hidden shadow-2xl border-4 border-zinc-100 relative">
                    <video id="task-video" src="${t.content}" controls controlsList="nodownload nofullscreen noremoteplayback" playsinline data-completed="${isC}" class="w-full aspect-video object-contain"></video>
                  </div>
                  <div class="p-6 rounded-3xl text-base flex items-start gap-4 border-2 ${isC ? 'bg-zinc-50 border-zinc-200 text-zinc-600' : 'bg-zinc-900 border-zinc-800 text-white shadow-lg'}">
                     ${isC ? icon('checkCircle',32,'text-zinc-900 shrink-0 mt-1') : icon('alertCircle',32,'shrink-0 mt-1')}
                     <p class="font-bold leading-relaxed">${isC ? 'この動画は視聴完了済みです。<br><span class="font-medium text-zinc-500 mt-1 block">自由に早送り・巻き戻しして復習できます。</span>' : '早送りは無効化されています。<br><span class="text-zinc-400 font-medium mt-1 block">最後まで(100%)視聴すると自動完了します。</span>'}</p>
                  </div>
                </div>`;
            } else if(t.type === 'text') {
                contentHtml = `
                <div class="space-y-8 pt-6">
                  ${isC || (ut && !ut.isCompleted) ? `
                    <div class="text-center py-8">
                      <div class="w-20 h-20 bg-zinc-50 border border-zinc-200 ${isC?'text-zinc-900':'text-zinc-400'} rounded-full flex justify-center items-center mx-auto mb-6 shadow-sm">${icon(isC?'checkCircle':'messageSquare',40)}</div>
                      <h3 class="text-2xl font-black">${isC?'承認済み':'提出完了'}</h3>
                      <p class="text-zinc-500 font-bold mt-2 text-lg">${isC?'上層部からの確認が完了しました。':'管理者の確認をお待ちください。'}</p>
                      <div class="mt-8 p-8 bg-zinc-50 rounded-[2rem] text-left border border-zinc-200 shadow-inner">
                        <p class="text-xs font-black text-zinc-400 uppercase tracking-widest mb-4">提出内容</p>
                        <p class="font-bold whitespace-pre-wrap text-zinc-900 text-lg leading-relaxed">${escapeHTML(ut.textAnswer)}</p>
                        ${isC && ut.adminComment ? `
                          <div class="mt-6 pt-6 border-t border-zinc-200">
                             <p class="text-xs font-black text-zinc-900 uppercase tracking-widest mb-3 flex items-center gap-2">${icon('messageSquare',16)} フィードバック</p>
                             <p class="font-bold whitespace-pre-wrap text-zinc-700 bg-white p-6 rounded-2xl border border-zinc-100 shadow-sm leading-relaxed">${escapeHTML(ut.adminComment)}</p>
                          </div>
                        ` : ''}
                      </div>
                    </div>
                  ` : `
                    <p class="text-base font-bold text-zinc-600 bg-zinc-50 p-6 rounded-2xl border border-zinc-100 leading-relaxed shadow-sm">稼働してみて思ったこと、良かったこと、悪かったこと、わからなかったことを具体的に言語化してください。</p>
                    <textarea id="textAnswerInput" rows="8" placeholder="ここに入力..." class="font-bold text-lg p-6 rounded-3xl border-2 border-zinc-200 bg-white shadow-sm"></textarea>
                    <button data-action="submit-text" class="w-full py-6 bg-zinc-900 text-white font-black rounded-[2rem] shadow-xl text-xl active:scale-95 transition-transform">上層部に提出する</button>
                  `}
                </div>`;
            } else if(t.type === 'test') {
                let testData = { questions: [], passScore: 100 };
                try { testData = JSON.parse(t.content); } catch(e){}
                
                if(state.testResult) {
                    contentHtml = `
                    <div class="text-center py-12 space-y-8 animate-in">
                      <div class="w-36 h-36 mx-auto rounded-full flex items-center justify-center text-6xl font-black border-4 shadow-xl ${state.testResult.passed?'bg-white border-emerald-500 text-emerald-600':'bg-red-50 border-red-200 text-red-600'}">${state.testResult.score}</div>
                      <div>
                        <h3 class="text-4xl font-black mb-3 tracking-tight">${state.testResult.passed?'合格！':'不合格...'}</h3>
                        <p class="text-zinc-500 font-bold text-lg">${state.testResult.passed?'おめでとうございます！次へ進みましょう。':'復習して再挑戦してください。'}</p>
                      </div>
                      <button data-action="save-test" class="w-full py-6 bg-zinc-900 text-white font-black rounded-[2rem] shadow-xl text-xl mt-8 active:scale-95 transition-transform">結果を保存して戻る</button>
                    </div>`;
                } else {
                    const isAllAns = Object.keys(state.testAnswers).length === testData.questions.length;
                    contentHtml = `
                    <div class="space-y-10 pt-6">
                      <div class="flex justify-between items-center bg-zinc-50 p-6 rounded-3xl border border-zinc-200 shadow-sm">
                         <span class="text-sm font-black tracking-widest uppercase">合格ライン: ${testData.passScore}点</span>
                         ${isC ? `<span class="text-xs font-bold text-zinc-500 bg-white px-4 py-2 border border-zinc-200 rounded-xl shadow-sm">過去に合格済 (最高: ${ut.score}点)</span>`:''}
                      </div>
                      <div class="space-y-8">
                        ${testData.questions.map((q, i) => `
                          <div class="bg-white p-8 rounded-[2rem] border border-zinc-200 shadow-sm">
                            <p class="font-black text-xl leading-relaxed mb-6"><span class="text-zinc-400 mr-3 text-2xl">Q${i+1}.</span>${escapeHTML(q.q)}</p>
                            <div class="space-y-4">
                              ${q.options.map((opt, oi) => {
                                 const sel = state.testAnswers[i] === oi;
                                 return `
                                 <label class="flex items-center gap-4 p-5 border-2 rounded-2xl cursor-pointer transition-all ${sel?'border-zinc-900 bg-zinc-900 shadow-lg text-white':'border-zinc-100 bg-white hover:border-zinc-300'}">
                                   <input type="radio" name="q_${i}" value="${oi}" class="hidden" data-action="test-select" data-qi="${i}" data-oi="${oi}" ${sel?'checked':''}/>
                                   <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${sel?'border-white':'border-zinc-300'}">
                                     ${sel?'<div class="w-3 h-3 bg-white rounded-full"></div>':''}
                                   </div>
                                   <span class="font-bold text-lg leading-relaxed ${sel?'text-white':'text-zinc-700'}">${escapeHTML(opt)}</span>
                                 </label>`;
                              }).join('')}
                            </div>
                          </div>
                        `).join('')}
                      </div>
                      <button data-action="score-test" class="w-full py-6 bg-zinc-900 text-white font-black rounded-[2rem] shadow-xl text-xl mt-10 active:scale-95 transition-transform" ${isAllAns?'':'disabled'}>採点する</button>
                    </div>`;
                }
            }

            return `
            <div class="max-w-3xl mx-auto space-y-8 animate-in pb-16">
               <button data-action="nav" data-view="dashboard" class="text-zinc-500 font-black text-sm flex items-center gap-2 hover:text-zinc-900 transition-colors">${icon('chevronRight',20,'rotate-180')} 戻る</button>
               <div class="bg-white p-10 md:p-14 rounded-[3rem] shadow-sm border border-zinc-200">
                  ${renderBadge(t.type, 'amber')}
                  <h2 class="text-4xl font-black mt-6 mb-8 tracking-tighter leading-tight">${escapeHTML(t.title)}</h2>
                  ${contentHtml}
               </div>
            </div>`;
        }

        function renderMainApp() {
            let mainHtml = '';
            const v = state.view;
            if(v === 'dashboard') {
                if(state.currentUser.role === 'admin') mainHtml = renderAdminDashboard();
                else mainHtml = renderUserDashboard();
            } else if(v === 'manage' && state.currentUser.role === 'admin') {
                mainHtml = renderPhaseManagement();
            } else if(v === 'userDetail') {
                mainHtml = renderUserDetail();
            } else if(v === 'taskExec') {
                mainHtml = renderTaskExec();
            }

            return `
              ${renderSidebar()}
              <main class="main-content">
                ${mainHtml}
              </main>
            `;
        }

        // Modals
        function renderAlertDialog() {
            return `
            <div class="modal-overlay" data-action="close-modal">
                <div class="modal-content" onclick="event.stopPropagation()">
                    <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-emerald-100 shadow-inner">${icon('checkCircle',40)}</div>
                    <p class="font-black text-lg text-zinc-900 mb-8 whitespace-pre-wrap leading-relaxed">${escapeHTML(state.alert)}</p>
                    <button data-action="close-modal" class="w-full py-5 bg-zinc-900 text-white font-black rounded-2xl shadow-xl text-lg active:scale-95 transition-transform">OK</button>
                </div>
            </div>`;
        }
        
        function renderConfirmDialog() {
            return `
            <div class="modal-overlay" data-action="close-modal">
                <div class="modal-content" onclick="event.stopPropagation()">
                    <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-amber-100 shadow-inner">${icon('alertCircle',40)}</div>
                    <p class="font-black text-lg text-zinc-900 mb-8 whitespace-pre-wrap leading-relaxed">${escapeHTML(state.confirm.msg)}</p>
                    <div class="flex gap-4">
                        <button data-action="confirm-yes" class="flex-1 py-5 bg-red-600 text-white font-black rounded-2xl shadow-xl text-lg active:scale-95 transition-transform">はい</button>
                        <button data-action="close-modal" class="flex-1 py-5 bg-zinc-100 text-zinc-600 font-black rounded-2xl text-lg hover:bg-zinc-200 transition-colors">キャンセル</button>
                    </div>
                </div>
            </div>`;
        }

        function renderModal() {
            const root = document.getElementById('modal-root');
            let html = '';
            if(state.alert) html += renderAlertDialog();
            if(state.confirm) html += renderConfirmDialog();
            root.innerHTML = html;
        }

        // ==========================================
        // 6. メインレンダーと初期化
        // ==========================================
        function render() {
            const appRoot = document.getElementById('app');
            if (state.currentUser) {
                appRoot.innerHTML = renderMainApp();
            } else {
                appRoot.innerHTML = renderAuth();
            }
            renderModal();
            setTimeout(setupVideoPlayer, 0);
        }

        function init() {
            document.addEventListener('input', handleGlobalInput);
            document.addEventListener('change', handleGlobalChange);
            document.addEventListener('click', handleGlobalClick);
            render();
        }

        // ==========================================
        // 7. イベントバインディング
        // ==========================================
        function handleGlobalInput(e) {
            const el = e.target;
            if(el.id === 'authName') state.authName = el.value;
            if(el.id === 'authPass') state.authPass = el.value;
            if(el.id === 'authSecret') state.authSecret = el.value;
            if(el.id === 'newPhaseName') state.newPhaseName = el.value;
            if(el.id === 'newSecretKeyInput') state.newSecretKey = el.value;
            if(el.dataset.model === 'editTitle') state.editTaskData.title = el.value;
            if(el.dataset.model === 'editContent') state.editTaskData.content = el.value;
        }

        function handleGlobalChange(e) {
            const el = e.target;
            if(el.id === 'avatarUpload') {
                const file = el.files[0];
                if(!file) return;
                const r = new FileReader();
                r.onload = ev => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = 150;
                        if(w>h){if(w>max){h*=max/w;w=max;}}else{if(h>max){w*=max/h;h=max;}}
                        canvas.width=w; canvas.height=h;
                        canvas.getContext('2d').drawImage(img,0,0,w,h);
                        state.authAvatarUrl = canvas.toDataURL('image/jpeg', 0.8);
                        render();
                    };
                    img.src = ev.target.result;
                };
                r.readAsDataURL(file);
            }
            if(el.dataset.model === 'editType') {
                state.editTaskData.type = el.value;
                render();
            }
        }

        function handleGlobalClick(e) {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const action = btn.getAttribute('data-action');

            // Modals
            if (action === 'close-modal') closeModals();
            if (action === 'confirm-yes') {
                if(state.confirm && state.confirm.onConfirm) state.confirm.onConfirm();
                closeModals();
            }

            // Auth
            if (action === 'switch-auth') { state.authMode = state.authMode==='login'?'new':'login'; state.authError=''; render(); }
            if (action === 'toggle-pass') { state.authShowPass = !state.authShowPass; render(); }
            if (action === 'set-role') { state.authRole = btn.dataset.role; render(); }
            if (action === 'submit-auth') {
                state.authError = '';
                if(!state.authName || !state.authPass) { state.authError = '氏名とパスワードを入力してください'; render(); return; }
                if(state.authMode === 'new') {
                    if(state.authRole === 'admin' && state.authSecret !== state.settings.adminSecretKey) {
                        state.authError = 'シークレットキーが違います'; render(); return;
                    }
                    if(state.profiles.some(p=>p.name === state.authName)) {
                        state.authError = 'その名前は既に存在します'; render(); return;
                    }
                    const newId = genId();
                    const newP = { id: newId, name: state.authName, password: state.authPass, role: state.authRole, avatarUrl: state.authAvatarUrl, lastActiveAt: Date.now(), createdAt: Date.now(), workDays: 0 };
                    state.profiles.push(newP); save('origin_profiles', state.profiles);
                    localStorage.setItem('origin_current_id', newId);
                    state.currentUser = newP;
                    if(state.authRole==='admin' && state.phases.length===0) seedData();
                    render();
                } else {
                    const match = state.profiles.find(p=>p.name===state.authName && p.password===state.authPass);
                    if(match) {
                        match.lastActiveAt = Date.now(); save('origin_profiles', state.profiles);
                        localStorage.setItem('origin_current_id', match.id);
                        state.currentUser = match; render();
                    } else { state.authError = '氏名かパスワードが違います'; render(); }
                }
            }
            if (action === 'logout') {
                localStorage.removeItem('origin_current_id');
                state.currentUser = null; state.view = 'dashboard'; state.mobileMenuOpen=false;
                state.authName = ''; state.authPass = ''; state.authSecret = ''; state.authAvatarUrl = '';
                render();
            }

            // Nav
            if (action === 'nav') { state.view = btn.dataset.view; state.mobileMenuOpen = false; render(); }
            if (action === 'toggle-menu') { state.mobileMenuOpen = !state.mobileMenuOpen; render(); }
            if (action === 'reload') { window.location.reload(); }

            // Admin Dashboard
            if (action === 'select-user') {
                state.activeTargetUser = state.profiles.find(p=>p.id===btn.dataset.uid);
                state.view = 'userDetail'; render();
            }

            // User Dashboard
            if (action === 'start-work') { handleStartWork(); }
            if (action === 'select-task') {
                state.activeTask = state.tasks.find(t=>t.id===btn.dataset.tid);
                state.testAnswers = {}; state.testResult = null;
                state.view = 'taskExec'; render();
            }

            // Task Exec
            if (action === 'complete-task') { completeTask(state.activeTask.id); }
            if (action === 'submit-text') { 
                const text = document.getElementById('textAnswerInput').value;
                if(text) completeTask(state.activeTask.id, { textAnswer: text });
            }
            if (action === 'test-select') {
                state.testAnswers[btn.dataset.qi] = parseInt(btn.dataset.oi, 10);
                render();
            }
            if (action === 'score-test') {
                let testData = { questions: [], passScore: 100 };
                try { testData = JSON.parse(state.activeTask.content); } catch(e){}
                let correct = 0;
                testData.questions.forEach((q, i) => { if(state.testAnswers[i] === q.answer) correct++; });
                const score = Math.round((correct / testData.questions.length) * 100);
                state.testResult = { score, passed: score >= testData.passScore };
                render();
            }
            if (action === 'save-test') {
                const ut = state.userTasks.find(x=>x.taskId===state.activeTask.id && x.userId===state.currentUser.id);
                const max = ut?.score ? Math.max(ut.score, state.testResult.score) : state.testResult.score;
                const isC = ut?.isCompleted || state.testResult.passed;
                completeTask(state.activeTask.id, { score: max, attempts: (ut?.attempts||0)+1, isCompleted: isC });
            }

            // User Detail (Admin Approve)
            if (action === 'approve-task') {
                const inp = document.getElementById(`feedback_${btn.dataset.utid}`);
                const ut = state.userTasks.find(x=>x.id===btn.dataset.utid);
                if(ut) {
                    ut.adminComment = inp.value || '確認しました';
                    ut.isCompleted = true;
                    save('origin_userTasks', state.userTasks);
                    render();
                }
            }

            // Manage
            if (action === 'seed-data') seedData();
            if (action === 'reset-seed-data') {
                showConfirm("現在のタスクを全て削除し、全39タスクに初期化しますか？\n※ユーザーの進捗は保持されます。", () => {
                    state.phases = []; state.tasks = [];
                    save('origin_phases', []); save('origin_tasks', []);
                    seedData();
                });
            }
            if (action === 'update-secret') {
                state.settings.adminSecretKey = state.newSecretKey;
                save('origin_settings', state.settings);
                showAlert('✅ 管理者シークレットキーを更新しました！');
            }
            if (action === 'add-phase') {
                if(state.newPhaseName) {
                    state.phases.push({ id: genId(), name: state.newPhaseName, order: state.phases.length+1 });
                    save('origin_phases', state.phases);
                    state.newPhaseName = ''; render();
                }
            }
            if (action === 'delete-phase') {
                showConfirm("フェーズとその中の全タスクを削除しますか？", () => {
                    state.phases = state.phases.filter(p=>p.id!==btn.dataset.pid); save('origin_phases', state.phases);
                    state.tasks = state.tasks.filter(t=>t.phaseId!==btn.dataset.pid); save('origin_tasks', state.tasks);
                    render();
                });
            }
            if (action === 'add-task') {
                state.tasks.push({ id: genId(), phaseId: btn.dataset.pid, title: '新規タスク', type: 'normal', content: '', order: state.tasks.length+1 });
                save('origin_tasks', state.tasks); render();
            }
            if (action === 'delete-task') {
                showConfirm(`タスク「${btn.dataset.title}」を削除しますか？`, () => {
                    state.tasks = state.tasks.filter(t=>t.id!==btn.dataset.tid); save('origin_tasks', state.tasks); render();
                });
            }
            if (action === 'edit-task') {
                const tk = state.tasks.find(t=>t.id===btn.dataset.tid);
                if(tk) { state.editingTask = tk; state.editTaskData = { ...tk }; render(); }
            }
            if (action === 'cancel-edit') { state.editingTask = null; render(); }
            if (action === 'save-edit') {
                Object.assign(state.editingTask, state.editTaskData);
                save('origin_tasks', state.tasks);
                state.editingTask = null; render();
            }
        }

        // ==========================================
        // 8. 特殊DOM操作 (Video)
        // ==========================================
        function setupVideoPlayer() {
            const video = document.getElementById('task-video');
            if(!video || video.dataset.setup === 'true') return;
            video.dataset.setup = 'true';
            
            const isCompleted = video.dataset.completed === 'true';
            let maxTime = 0;
            
            video.addEventListener('timeupdate', () => {
                if (isCompleted) return;
                if (video.currentTime > maxTime + 1.5) { video.currentTime = maxTime; } 
                else { maxTime = Math.max(maxTime, video.currentTime); }
            });
            
            video.addEventListener('ended', () => {
                if (!isCompleted) completeTask(state.activeTask.id, { completionRate: 100 });
            });
        }

        // ==========================================
        // 起動
        // ==========================================
        init();

    </script>
</body>
</html>
